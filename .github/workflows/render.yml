name: Render Video Microstock

on:
  push:
    branches:
      - main

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - name: Ambil Kode
        uses: actions/checkout@v4

      - name: Setup Node.js Terbaru
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Instal Dependensi Linux (Wajib untuk Chrome)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg libgbm1

      - name: Instal Dependensi Project
        run: |
          npm install
          npx remotion browser ensure

      - name: Proses Render Video 4K Berwarna
        run: |
          npx remotion render HelloWorld out/video-berwarna.mp4 --codec=h264 --audio=false

      - name: Simpan Hasil Video
        uses: actions/upload-artifact@v4
        with:
          name: video-berwarna-siap-jual
          path: out/video-berwarna.mp4
